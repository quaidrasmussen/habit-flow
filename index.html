  /* ── AI Coach ──────────────────────────────────────────────────────────── */
  var COACH_SYSTEM = `You are a wise, exacting coach with deep expertise in behavior change, habit formation, exercise physiology, nutrition, sleep science, and applied psychology. Your role is to read a user's habit regimen, their daily reflection, and their recent compliance history, then propose exactly 2 high-impact INSIGHTS. For each insight, you provide exactly 2 different concrete ways the user could apply it to their habit list, approaching the same problem from different angles.

Principles:
- Calibrate intensity to compliance. Keeping pace → push harder. Slipping → ease back and rebuild momentum. Always stay challenging — never coast.
- Favor insights with highest probabilistic long-term impact: sleep, daily movement, deep work, deliberate practice, social connection, and meaning generally outweigh micro-optimizations.
- Never modify category groupings. All changes happen within existing categories.
- Each application option must be specific, actionable, and small enough to start tomorrow.

Title style — IMPERATIVE ACTIONS, not noun phrases:
- Good: 'Plan your work block the night before' / 'Anchor protein to every meal' / 'Cut the snooze loop'
- Bad: 'Pre-commit your deep work target' / 'Add protein target' / 'Reduce snooze usage'

Why + how — keep them separate fields:
- 'why' = the mechanism, 1-2 sentences grounded in evidence
- 'how' = the concrete actionable tip, 1-2 sentences ('When evening hits, write tomorrow's one priority task on a sticky note next to your laptop')

Application options — two distinct angles per insight:
- Approach the problem from genuinely different angles (one might tweak existing habit, another might add a new one, another might condense; avoid two options that only differ in habit name)
- Each option's 'preview' must describe the EXACT change in plain English

Preview format examples:
- 'Will rename "1 deep work block" to "1 deep work block (pick task night before)"'
- 'Will add new habit "Choose tomorrow's deep work task" to Productivity'
- 'Will combine "Read 10 minutes" into "45-min focused block" (removes the separate reading habit)'

Tone: clear, direct, warm. No flattery. No hedging. No toxic positivity. Capable adult.

Output ONLY valid JSON (no markdown fences, no prose outside JSON):
{
  "compliance_read": "keeping_pace" | "slowing_down" | "steady" | "new_user",
  "hint": "<one teaser sentence, max 15 words>",
  "suggestions": [
    {
      "title": "<imperative action>",
      "why": "<mechanism, 1-2 sentences>",
      "how": "<concrete tip, 1-2 sentences>",
      "impact_prediction": "<what user should notice within a week>",
      "options": [
        {
          "label": "<short angle name, e.g. 'Embed planning into your existing block'>",
          "preview": "<plain-English exact change>",
          "action": "add" | "tweak" | "remove" | "condense",
          "target_habit_id": "<id or null>",
          "absorbed_habit_ids": [],
          "modification": {
            "name": "<new name or null>",
            "categoryId": "<existing category id>"
          }
        }
      ]
    }
  ]
}

Constraints:
- Exactly 2 suggestions.
- Each suggestion has exactly 2 options.
- For 'remove': modification = null.
- For 'add': target_habit_id = null.
- For 'tweak': keep categoryId same as target's current category.
- For 'condense': target_habit_id is the survivor, absorbed_habit_ids lists deleted habits.`;

  function stripFences(t) {
    t = (t || '').trim();
    if (t.indexOf('```') === 0) {
      t = t.replace(/^```[a-zA-Z]*\s*/, '').replace(/```$/, '').trim();
    }
    return t;
  }

  function buildCoachPayload() {
    var habits = getHabits();
    var cats   = getCats();
    var days   = getDays();
    var TODAY  = getToday();

    var currentHabits = habits.map(function(h) { return { id: h.id, name: h.name, categoryId: h.categoryId }; });
    var currentCategories = cats.map(function(c) { return { id: c.id, name: c.name }; });

    var last7 = [];
    for (var i = 6; i >= 0; i--) {
      var date = dateAdd(TODAY, -i);
      var day = days[date];
      last7.push({ date: date, submitted: !!(day && day.submitted), completions: (day && day.completions) || {} });
    }

    /* Compliance: last 4 days that actually have AI suggestions (Phase 5 plumbing) */
    var withAI = Object.keys(days).filter(function(k) {
      return days[k] && days[k].aiResponse && days[k].aiResponse.suggestions && days[k].aiResponse.suggestions.length;
    }).sort();
    withAI = withAI.slice(-4);
    var compliance = withAI.map(function(date) {
      return {
        date: date,
        suggestions: days[date].aiResponse.suggestions.map(function(s) {
          return {
            title: s.title,
            applied: !!s.applied,
            skipped: !!s.skipped,
            appliedOption: (s.applied && s.options && typeof s.appliedOption === 'number' && s.options[s.appliedOption]) ? s.options[s.appliedOption].label : null,
            optionsOffered: s.options ? s.options.map(function(o) { return o.label; }) : []
          };
        })
      };
    });

    var tr = (days[TODAY] && days[TODAY].reflection) ? days[TODAY].reflection : { wentWell: '', wasHard: '', wantDifferent: '' };

    return JSON.stringify({
      currentHabits: currentHabits,
      currentCategories: currentCategories,
      last7DaysCompletions: last7,
      last4DaysSuggestionsCompliance: compliance,
      todayReflection: tr
    });
  }

  function coachTeaser(html) {
    var t = document.getElementById('coach-teaser');
    if (t) t.innerHTML = html;
  }
  function coachRetry(msg) {
    coachTeaser('<p style="color:rgba(var(--fg),.6);font-size:14px;line-height:1.5;margin-bottom:10px">' + msg + '</p>' +
      '<button id="coach-retry" class="tap97" style="background:rgba(var(--fg),.06);border:1px solid rgba(var(--fg),.12);color:rgba(var(--fg),.8);font-size:13px;font-weight:500;padding:8px 16px;border-radius:.6rem">Try again</button>');
    var b = document.getElementById('coach-retry');
    if (b) b.addEventListener('click', runCoach);
  }
  function coachHint(hint) {
    coachTeaser('<p style="color:rgba(var(--fg),.82);font-size:14px;font-style:italic;line-height:1.6">' + esc(hint) + '</p>' +
      '<p style="color:rgba(var(--fg),.4);font-size:12px;margin-top:6px">Tomorrow’s full plan ready.</p>');
  }

  function runCoach() {
    var habits = getHabits();
    var s = getSettings();
    var key = (s.apiKey || '').trim();
    var TODAY = getToday();

    if (!habits.length) {
      coachTeaser('<p style="color:rgba(var(--fg),.6);font-size:14px;line-height:1.5">Add some habits first; the coach needs something to work with.</p>');
      return;
    }
    if (!key) {
      coachTeaser('<p style="color:rgba(var(--fg),.6);font-size:14px;line-height:1.5">Set your API key in Settings to get coach suggestions. ' +
        '<button id="coach-open-settings" style="color:var(--ac-hex);font-weight:600;text-decoration:underline">Open Settings</button></p>');
      var os = document.getElementById('coach-open-settings');
      if (os) os.addEventListener('click', goToSettings);
      return;
    }

    coachTeaser('<p style="color:rgba(var(--fg),.5);font-size:14px;font-style:italic">Coach is thinking…</p>');

    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1500,
        system: COACH_SYSTEM,
        messages: [{ role: 'user', content: buildCoachPayload() }]
      })
    }).then(function(resp) {
      if (!resp.ok) {
        return resp.text().then(function(t) {
          var msg;
          try { var j = JSON.parse(t); msg = (j.error && j.error.message) ? j.error.message : ('HTTP ' + resp.status); }
          catch (e) { msg = 'HTTP ' + resp.status; }
          coachRetry(esc(msg));
          return null;
        });
      }
      return resp.json();
    }).then(function(data) {
      if (!data) return;
      var text = '';
      if (data.content && data.content.length) {
        data.content.forEach(function(b) { if (b.type === 'text') text += b.text; });
      }
      var parsed;
      try { parsed = JSON.parse(stripFences(text)); }
      catch (e) { coachRetry('Coach response unreadable — try again.'); return; }
      if (!parsed || !Array.isArray(parsed.suggestions)) {
        coachRetry('Coach response unreadable — try again.');
        return;
      }
      var _surfaceOn = dateAdd(TODAY, 1); /* yesterday's plan surfaces today, so this one surfaces tomorrow */
      var sugg = parsed.suggestions.map(function(x) { x.applied = false; x.skipped = false; x.surfaceOn = _surfaceOn; return x; });
      var d = getDays();
      if (!d[TODAY]) d[TODAY] = { completions: {}, submitted: true };
      d[TODAY].aiResponse = {
        hint: parsed.hint || '',
        compliance_read: parsed.compliance_read || '',
        suggestions: sugg,
        generatedAt: new Date().toISOString()
      };
      lsSet('hf.days', d);
      coachHint(parsed.hint || '');
    }).catch(function() {
      coachRetry('Couldn’t reach the coach. Try again.');
    });
  }

  /* ── Apply / skip coach suggestions (morning plan) ─────────────────────── */
  function applySuggestion(sug, optIdx) {
    /* New-format suggestions carry the action on the chosen option; old-format
       suggestions carry it on the suggestion itself. */
    var src = (sug.options && typeof optIdx === 'number') ? sug.options[optIdx] : sug;
    if (!src) return;
    var habits = getHabits();
    var mod = src.modification || {};
    function tn(n) { n = String(n == null ? '' : n); return n.length > 30 ? n.slice(0, 30) + '…' : n; }
    if (src.action === 'add') {
      var catId = mod.categoryId;
      var inCat = habits.filter(function(h) { return h.categoryId === catId; });
      var maxOrd = inCat.reduce(function(m, h) { return Math.max(m, h.order); }, -1);
      var addName = mod.name || 'New habit';
      habits.push({ id: genId('h_'), name: addName, categoryId: catId, order: maxOrd + 1, createdAt: new Date().toISOString() });
      lsSet('hf.habits', habits);
      showToast("Habit added: '" + tn(addName) + "'");
    } else if (src.action === 'tweak') {
      var ti = habits.findIndex(function(h) { return h.id === src.target_habit_id; });
      if (ti !== -1 && mod.name) { habits[ti].name = mod.name; lsSet('hf.habits', habits); showToast("Habit updated: '" + tn(mod.name) + "'"); }
      else console.warn('applySuggestion: tweak had no matching target or name', { action: src.action, target_habit_id: src.target_habit_id, modification: src.modification });
    } else if (src.action === 'remove') {
      var remHab = habits.find(function(h) { return h.id === src.target_habit_id; });
      if (!remHab)
        console.warn('applySuggestion: remove had no matching id', { action: src.action, target_habit_id: src.target_habit_id, modification: src.modification });
      lsSet('hf.habits', habits.filter(function(h) { return h.id !== src.target_habit_id; }));
      if (remHab) showToast("Habit removed: '" + tn(remHab.name) + "'");
    } else if (src.action === 'condense') {
      var si = habits.findIndex(function(h) { return h.id === src.target_habit_id; });
      if (si !== -1 && mod.name) habits[si].name = mod.name;
      else if (si === -1) console.warn('applySuggestion: condense had no matching survivor', { action: src.action, target_habit_id: src.target_habit_id, modification: src.modification });
      var condName = si !== -1 ? habits[si].name : (mod.name || '');
      var absorb = src.absorbed_habit_ids || [];
      habits = habits.filter(function(h) { return absorb.indexOf(h.id) === -1; });
      lsSet('hf.habits', habits);
      showToast("Habits combined: '" + tn(condName) + "'");
    }
  }

  document.addEventListener('click', function(e) {
    var optApplyBtn = e.target.closest('[data-apply-sug]');   /* apply a chosen option */
    var applyBtn    = e.target.closest('[data-plan-apply]');  /* old format: single apply */
    var laterBtn    = e.target.closest('[data-plan-later]');  /* maybe later */
    var skipBtn     = e.target.closest('[data-plan-skip]');   /* not for me */
    if (!optApplyBtn && !applyBtn && !laterBtn && !skipBtn) return;
    var tv = document.getElementById('view-today');
    if (!tv || tv.classList.contains('hidden')) return;

    var trigger = optApplyBtn || applyBtn || laterBtn || skipBtn;
    var attr = optApplyBtn ? 'data-apply-sug' : applyBtn ? 'data-plan-apply' : laterBtn ? 'data-plan-later' : 'data-plan-skip';
    var idx = parseInt(trigger.getAttribute(attr), 10);
    var TODAY = getToday();
    /* Suggestions can come from any of the last 14 days — act on the right origin. */
    var originDate = trigger.getAttribute('data-origin') || dateAdd(TODAY, -1);
    var d = getDays();
    var origin = d[originDate];
    if (!origin || !origin.aiResponse || !origin.aiResponse.suggestions || !origin.aiResponse.suggestions[idx]) return;
    var sug = origin.aiResponse.suggestions[idx];

    if (laterBtn) {
      sug.surfaceOn = dateAdd(TODAY, 1);
      lsSet('hf.days', d);
      renderToday();
      return;
    }

    if (skipBtn) {
      sug.skipped = true;
      lsSet('hf.days', d);
      renderToday();
      return;
    }

    if (optApplyBtn) {
      var optIdx = parseInt(optApplyBtn.getAttribute('data-apply-opt'), 10);
      applySuggestion(sug, optIdx);
      sug.applied = true;
      sug.appliedOption = optIdx;
    } else {
      applySuggestion(sug);
      sug.applied = true;
    }
    lsSet('hf.days', d);
    renderHabitsView();
    renderToday();
  });

  /* ── Theme (light / dark / system) ──────────────────────────────────────── */
  function effectiveTheme(mode) {
    if (mode === 'light' || mode === 'dark') return mode;
    return (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
  }
  function applyTheme() {
    var eff = effectiveTheme((getSettings().theme) || 'dark');
    document.documentElement.setAttribute('data-theme', eff);
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', eff === 'light' ? '#f6f7f9' : '#0a0a0a');
  }
  /* Follow the OS only while the user's choice is System. */
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function() {
      if (((getSettings().theme) || 'dark') === 'system') applyTheme();
    });
  }

  applyTheme();
  pruneDrafts();
  renderAllPages();
  renderTabs();
  setupPager();
  goToTab('today', false);
  </script>
</body>
</html>
